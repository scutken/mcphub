name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build Windows executable
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          wails build -platform windows/amd64 -ldflags "-s -w" -o mcphub.exe

      - name: Create or update versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $content = Get-Content -Raw CHANGELOG.md
          $pattern = "(?s)## \[$version\].*?(?=## \[|\z)"
          $match = [regex]::Match($content, $pattern)
          if (-not $match.Success) {
            Write-Error "No changelog entry for version $version"
            exit 1
          }
          $match.Value.Trim() | Out-File -FilePath release-notes.md -Encoding utf8NoBOM

          $release = gh release view "${{ github.ref_name }}" --json url 2>$null
          if ($release) {
            gh release edit "${{ github.ref_name }}" --title "Release ${{ github.ref_name }}" --notes-file release-notes.md
            gh release upload "${{ github.ref_name }}" build/bin/mcphub.exe --clobber
          } else {
            gh release create "${{ github.ref_name }}" build/bin/mcphub.exe --title "Release ${{ github.ref_name }}" --notes-file release-notes.md
          }

      - name: Upload to Nightly Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: "Latest build from main branch."
          files: build/bin/mcphub.exe
          prerelease: true
          make_latest: false
